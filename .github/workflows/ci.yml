name: CI
on:
  push: { branches: [main, master] }
  pull_request: { branches: [main, master] }

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - run: ruff check .
      - run: pytest -v
      - run: memory-conformance --force

  leaderboard:
    runs-on: ubuntu-latest
    needs: test
    # Only update LEADERBOARD.md on pushes to main/master, not on PRs.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e . -q
      - name: Regenerate LEADERBOARD.md
        run: python scripts/update_leaderboard.py
      - name: Commit LEADERBOARD.md if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet LEADERBOARD.md; then
            git add LEADERBOARD.md
            git commit -m "ci: auto-update LEADERBOARD.md [skip ci]"
            git push
          else
            echo "LEADERBOARD.md unchanged — nothing to commit."
          fi
